<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 변경 - HanSung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background: linear-gradient(90deg, #1a1a2e, #0f3460); }
        .navbar-brand { font-weight: 800; color: #e94560 !important; font-size: 1.4rem; }
        .form-card { border: none; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
        .page-header { border-left: 4px solid #e94560; padding-left: 1rem; }
        .btn-register { background: #e94560; border-color: #e94560; }
        .btn-register:hover { background: #c73652; border-color: #c73652; }
        .form-control:focus, .form-select:focus {
            border-color: #e94560; box-shadow: 0 0 0 0.2rem rgba(233,69,96,.2);
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">HanSung</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/home}">홈</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/products}">상품 목록</a></li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/products/add}">상품 등록</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/dashboard}">관리자</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/user/password}">비밀번호 변경</a>
                </li>
            </ul>
            <form th:action="@{/logout}" method="post" class="d-flex">
                <button class="btn btn-outline-light btn-sm px-3">로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<div class="container">
    <div class="page-header mb-4">
        <h4 class="fw-bold mb-0">비밀번호 변경</h4>
        <small class="text-muted">현재 비밀번호 확인 후 새 비밀번호로 변경하세요.</small>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card form-card">
                <div class="card-body p-5">
                    <form th:action="@{/user/password}" th:object="${passwordChangeDto}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">현재 비밀번호</label>
                            <input type="password" th:field="*{currentPassword}"
                                   class="form-control form-control-lg" required>
                            <div class="text-danger small"
                                 th:if="${#fields.hasErrors('currentPassword')}"
                                 th:errors="*{currentPassword}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">새 비밀번호</label>
                            <input type="password" th:field="*{newPassword}"
                                   class="form-control form-control-lg" required>
                            <div class="text-danger small"
                                 th:if="${#fields.hasErrors('newPassword')}"
                                 th:errors="*{newPassword}"></div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">새 비밀번호 확인</label>
                            <input type="password" th:field="*{confirmPassword}"
                                   class="form-control form-control-lg" required>
                            <div class="text-danger small"
                                 th:if="${#fields.hasErrors('confirmPassword')}"
                                 th:errors="*{confirmPassword}"></div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary btn-lg flex-grow-1 fw-semibold">
                                변경
                            </button>
                            <a th:href="@{/home}" class="btn btn-outline-secondary btn-lg px-4">
                                취소
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<hr>
<footer class="text-center">
    <p class="text-muted small"
       th:text="${'학번: 2191200  |  성명: 송기환  |  실습 수행: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss')}"></p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
